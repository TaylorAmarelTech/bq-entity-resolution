name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: python -m ruff check src/ tests/
      - name: Ruff format check
        run: python -m ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Mypy
        run: python -m mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,local]"
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -q
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: python -m pytest tests/ --cov=bq_entity_resolution --cov-report=xml
      - name: Check coverage threshold
        if: matrix.python-version == '3.12'
        run: python -m pytest tests/ --cov=bq_entity_resolution --cov-fail-under=80
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  test-bqemulator:
    runs-on: ubuntu-latest
    services:
      bq-emulator:
        image: ghcr.io/goccy/bigquery-emulator:latest
        ports:
          - 9050:9050
          - 9060:9060
        options: >-
          --health-cmd "curl -f http://localhost:9050/ || true"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,local]"
      - name: Run BQ emulator tests
        env:
          BQEMU_HOST: localhost
          BQEMU_PORT: 9050
        run: python -m pytest tests/integration/test_bqemu_backend.py -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit
      - name: Audit dependencies
        run: pip-audit --strict

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
