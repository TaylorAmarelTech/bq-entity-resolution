stages:
  - lint
  - typecheck
  - test
  - security
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
  paths:
    - .pip-cache/

lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install -e ".[dev]"
    - python -m ruff check src/ tests/
    - python -m ruff format --check src/ tests/

typecheck:
  stage: typecheck
  image: python:3.12-slim
  script:
    - pip install -e ".[dev]"
    - python -m mypy src/

test:3.11:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e ".[dev,local]"
    - python -m pytest tests/ -v --tb=short -q

test:3.12:
  stage: test
  image: python:3.12-slim
  script:
    - pip install -e ".[dev,local]"
    - python -m pytest tests/ -v --tb=short -q
    - python -m pytest tests/ --cov=bq_entity_resolution --cov-report=xml --cov-fail-under=80
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

test:3.13:
  stage: test
  image: python:3.13-slim
  script:
    - pip install -e ".[dev,local]"
    - python -m pytest tests/ -v --tb=short -q

security:
  stage: security
  image: python:3.12-slim
  script:
    - pip install -e ".[dev]" pip-audit
    - pip-audit --strict
  allow_failure: true

build:
  stage: build
  image: python:3.12-slim
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/
  needs:
    - lint
    - typecheck
    - test:3.12
