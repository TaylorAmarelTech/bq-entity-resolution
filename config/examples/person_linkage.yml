# ============================================================================
# Cross-Source Person Linkage Example
# ============================================================================
# Links records across two source systems (CRM and ERP) to find the same
# person appearing in both. Key differences from dedup:
#
#   - link_type: link_only   → Only match across sources, not within
#   - comparison_pool        → Define comparisons once, reuse across tiers
#   - Multiple sources       → Each source has its own unique_key and updated_at
#
# Usage:
#   export BQ_PROJECT=your-gcp-project
#   bq-er validate --config config/examples/person_linkage.yml
#   bq-er preview-sql --config config/examples/person_linkage.yml --tier exact --stage all
#
# Expected output:
#   resolved_entities table with records from both CRM and ERP linked together.
#   Each cluster contains one CRM record and one ERP record (or singletons).
# ============================================================================

version: "1.0"

project:
  name: person_linkage
  bq_project: "${BQ_PROJECT}"

# link_only: Only generate candidate pairs across different sources.
# Without this, the pipeline also deduplicates within each source.
# Use "dedup_and_link" (default) to do both.
link_type: link_only

# ============================================================================
# Sources — two systems with overlapping person records
# ============================================================================
# Both sources MUST define the same column names for features to work.
# The unique_key and updated_at can differ (they're per-source system columns).

sources:
  - name: crm
    table: "${BQ_PROJECT}.raw.crm_contacts"
    unique_key: contact_id               # CRM's primary key
    updated_at: updated_at
    columns:
      - name: contact_id
        type: STRING
      - name: first_name
        type: STRING
      - name: last_name
        type: STRING
      - name: email
        type: STRING
      - name: phone
        type: STRING
      - name: updated_at
        type: TIMESTAMP

  - name: erp
    table: "${BQ_PROJECT}.raw.erp_customers"
    unique_key: customer_id              # ERP's primary key (different from CRM)
    updated_at: last_modified            # ERP uses different timestamp column name
    columns:
      - name: customer_id
        type: STRING
      - name: first_name
        type: STRING
      - name: last_name
        type: STRING
      - name: email
        type: STRING
      - name: phone
        type: STRING
      - name: last_modified
        type: TIMESTAMP

# ============================================================================
# Feature Engineering
# ============================================================================

feature_engineering:
  name_features:
    features:
      - name: first_name_clean
        function: name_clean
        input: first_name
      - name: last_name_clean
        function: name_clean
        input: last_name
      - name: last_name_soundex
        function: soundex
        input: last_name_clean

  contact_features:
    features:
      - name: email_clean
        function: lower_trim
        input: email
      - name: phone_clean
        function: phone_standardize
        input: phone

  blocking_keys:
    - name: bk_email
      function: farm_fingerprint
      inputs: [email_clean]
    - name: bk_name
      function: farm_fingerprint_concat
      inputs: [last_name_soundex, first_name_clean]

# ============================================================================
# Comparison Pool — define once, reference everywhere
# ============================================================================
# The comparison_pool lets you define comparisons with full parameters once
# and reference them by name in multiple tiers. This avoids duplication and
# ensures consistency.
#
# In tiers, use `ref: pool_name` to pull in the comparison.
# You can override individual fields (e.g., weight) per-tier.

comparison_pool:
  email_exact:
    left: email_clean
    right: email_clean
    method: exact
    weight: 5.0

  first_name_jw:
    left: first_name_clean
    right: first_name_clean
    method: jaro_winkler                 # Jaro-Winkler (requires JS UDF in BigQuery)
    params: { threshold: 0.85 }
    weight: 3.0

  last_name_exact:
    left: last_name_clean
    right: last_name_clean
    method: exact
    weight: 3.0

  phone_exact:
    left: phone_clean
    right: phone_clean
    method: exact
    weight: 4.0

# ============================================================================
# Matching Tiers
# ============================================================================
# Tiers cascade: pairs matched in Tier 1 are excluded from Tier 2.

matching_tiers:
  # Tier 1: High-confidence — email + name must match
  - name: exact
    blocking:
      paths:
        - keys: [bk_email]
    comparisons:
      - ref: email_exact                 # Pull from comparison_pool
      - ref: last_name_exact
      - ref: first_name_jw
    threshold:
      min_score: 8.0                     # email(5) + last(3) = 8 minimum

  # Tier 2: Broader — name + phone, with email as supporting evidence
  - name: fuzzy
    blocking:
      paths:
        - keys: [bk_name]
    comparisons:
      - ref: first_name_jw
      - ref: last_name_exact
      - ref: phone_exact
      - ref: email_exact
        weight: 2.0                      # Override pool weight: email is less important here
    threshold:
      min_score: 7.0
