version: "1.0"

project:
  name: address_dedup
  bq_project: "local-test"
  bq_dataset_bronze: er_bronze
  bq_dataset_silver: er_silver
  bq_dataset_gold: er_gold
  bq_dataset_meta: er_meta

sources:
  - name: addresses
    table: "local-test.raw.address_dedup"
    unique_key: id
    updated_at: updated_at
    columns:
      - name: id
        type: STRING
      - name: full_name
        type: STRING
        role: full_name
      - name: email
        type: STRING
        role: email
      - name: phone
        type: STRING
        role: phone
      - name: address_line_1
        type: STRING
        role: address_line_1
      - name: address_line_2
        type: STRING
      - name: city
        type: STRING
        role: city
      - name: state
        type: STRING
        role: state
      - name: zip
        type: STRING
        role: zip_code
      - name: updated_at
        type: TIMESTAMP

feature_engineering:
  name_features:
    features:
      - name: full_name_clean
        function: name_clean
        input: full_name
  contact_features:
    features:
      - name: email_clean
        function: lower_trim
        input: email
      - name: phone_clean
        function: phone_standardize
        input: phone
  address_features:
    features:
      - name: zip5
        function: zip5
        input: zip
      - name: address_std
        function: address_standardize
        input: address_line_1
  blocking_keys:
    - name: bk_email_fp
      function: farm_fingerprint
      inputs: [email_clean]
    - name: bk_name_zip_fp
      function: farm_fingerprint_concat
      inputs: [full_name_clean, zip5]
    - name: bk_phone_fp
      function: farm_fingerprint
      inputs: [phone_clean]

comparison_pool:
  email_exact:
    left: email_clean
    right: email_clean
    method: exact
    weight: 5.0
  name_exact:
    left: full_name_clean
    right: full_name_clean
    method: exact
    weight: 3.0
  phone_exact:
    left: phone_clean
    right: phone_clean
    method: exact
    weight: 4.0
  zip_exact:
    left: zip5
    right: zip5
    method: exact
    weight: 1.0

matching_tiers:
  - name: exact
    description: "Email or phone exact match + name + zip"
    blocking:
      cross_batch: false
      paths:
        - keys: [bk_email_fp]
        - keys: [bk_phone_fp]
    comparisons:
      - ref: email_exact
      - ref: name_exact
      - ref: phone_exact
      - ref: zip_exact
    threshold:
      min_score: 8.0

  - name: fuzzy
    description: "Name + zip blocking with supporting evidence"
    blocking:
      cross_batch: false
      paths:
        - keys: [bk_name_zip_fp]
        - keys: [bk_phone_fp]
    comparisons:
      - ref: name_exact
      - ref: phone_exact
      - ref: email_exact
      - ref: zip_exact
    threshold:
      min_score: 5.0

reconciliation:
  clustering:
    method: connected_components
    max_iterations: 20

monitoring:
  log_level: INFO
