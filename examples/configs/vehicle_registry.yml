# Vehicle Registry Entity Resolution Configuration
# Resolves duplicate vehicle registrations by matching on VIN, owner info,
# and license plates. Handles name changes, typos, and re-registrations.

version: "1.0"

project:
  name: vehicle_registry
  bq_project: "local-test"
  bq_dataset_bronze: er_bronze
  bq_dataset_silver: er_silver
  bq_dataset_gold: er_gold
  bq_dataset_meta: er_meta

sources:
  - name: vehicle_registry
    table: "local-test.raw.vehicle_registry"
    unique_key: id
    updated_at: updated_at
    columns:
      - name: id
        type: STRING
      - name: vin
        type: STRING
      - name: make
        type: STRING
      - name: model
        type: STRING
      - name: year
        type: STRING
      - name: color
        type: STRING
      - name: owner_first_name
        type: STRING
        role: first_name
      - name: owner_last_name
        type: STRING
        role: last_name
      - name: owner_email
        type: STRING
        role: email
      - name: owner_phone
        type: STRING
        role: phone
      - name: license_plate
        type: STRING
      - name: state
        type: STRING
      - name: updated_at
        type: TIMESTAMP

feature_engineering:
  name_features:
    features:
      - name: first_name_clean
        function: name_clean
        input: owner_first_name
      - name: last_name_clean
        function: name_clean
        input: owner_last_name
  contact_features:
    features:
      - name: email_clean
        function: lower_trim
        input: owner_email
      - name: phone_clean
        function: phone_standardize
        input: owner_phone
      - name: vin_clean
        function: lower_trim
        input: vin
  blocking_keys:
    - name: bk_vin_fp
      function: farm_fingerprint
      inputs: [vin_clean]
    - name: bk_owner_name_fp
      function: farm_fingerprint_concat
      inputs: [first_name_clean, last_name_clean]
    - name: bk_email_fp
      function: farm_fingerprint
      inputs: [email_clean]

comparison_pool:
  email_exact:
    left: email_clean
    right: email_clean
    method: exact
    weight: 4.0
  first_name_exact:
    left: first_name_clean
    right: first_name_clean
    method: exact
    weight: 2.0
  last_name_exact:
    left: last_name_clean
    right: last_name_clean
    method: exact
    weight: 2.0
  phone_exact:
    left: phone_clean
    right: phone_clean
    method: exact
    weight: 3.0
  vin_exact:
    left: vin_clean
    right: vin_clean
    method: exact
    weight: 8.0

matching_tiers:
  - name: vin_match
    description: "Exact VIN match — same physical vehicle"
    blocking:
      cross_batch: false
      paths:
        - keys: [bk_vin_fp]
    comparisons:
      - ref: vin_exact
      - ref: first_name_exact
      - ref: last_name_exact
      - ref: phone_exact
    threshold:
      min_score: 8.0

  - name: owner_match
    description: "Owner identity match via name and contact info"
    blocking:
      cross_batch: false
      paths:
        - keys: [bk_owner_name_fp]
        - keys: [bk_email_fp]
    comparisons:
      - ref: email_exact
      - ref: first_name_exact
      - ref: last_name_exact
      - ref: phone_exact
    threshold:
      min_score: 6.0

reconciliation:
  clustering:
    method: connected_components
    max_iterations: 20

monitoring:
  log_level: INFO
